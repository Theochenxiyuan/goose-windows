name: Windows Canary

on:
  push:
    branches: [main]
    paths-ignore:
      - 'documentation/**'
  workflow_dispatch:
    inputs:
      windows_variant:
        description: Windows package variant
        required: true
        type: choice
        default: standard
        options:
          - standard
          - cuda

concurrency:
  group: windows-canary-${{ github.ref }}-${{ github.event.inputs.windows_variant || 'standard' }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
  id-token: write
  attestations: write

jobs:
  prepare-version:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      variant: ${{ steps.version.outputs.variant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: version
        shell: bash
        run: |
          base_version=$(sed -n 's/^version = "\([^"]*\)"$/\1/p' Cargo.toml | head -n 1)
          if [ -z "$base_version" ]; then
            echo 'Could not read the workspace version.' >&2
            exit 1
          fi
          echo "version=${base_version}-canary+${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "variant=${{ github.event.inputs.windows_variant || 'standard' }}" >> "$GITHUB_OUTPUT"

  windows-package:
    name: Windows package
    needs: prepare-version
    permissions:
      contents: read
      actions: read
      id-token: write
    uses: ./.github/workflows/bundle-desktop-windows.yml
    with:
      version: ${{ needs.prepare-version.outputs.version }}
      signing: false
      windows_variant: ${{ needs.prepare-version.outputs.variant }}
      update_channel: canary

  publish-canary:
    name: Publish canary
    runs-on: ubuntu-latest
    needs: [prepare-version, windows-package]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: 'Goose-*'
          merge-multiple: true
      - name: Attest canary artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            *.zip
            *.msix
      - name: Publish canary release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: canary
          name: Windows Canary
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            *.zip
            *.msix
          allowUpdates: true
          removeArtifacts: true
          omitBody: true
          omitPrereleaseDuringUpdate: true
