name: Windows Release

on:
  push:
    branches:
      - 'release/*'
    tags:
      - 'v1.*'
    paths-ignore:
      - 'documentation/**'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: true
        type: string
      signing:
        description: Sign packages with Azure Trusted Signing
        required: true
        type: boolean
        default: false

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
  id-token: write
  attestations: write

jobs:
  standard:
    name: Standard Windows package
    permissions:
      contents: read
      actions: read
      id-token: write
    uses: ./.github/workflows/bundle-desktop-windows.yml
    with:
      ref: ${{ github.event.inputs.ref || '' }}
      signing: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.signing == 'true' }}
      windows_variant: standard
      update_channel: stable
    secrets: inherit

  cuda:
    name: CUDA Windows package
    permissions:
      contents: read
      actions: read
      id-token: write
    uses: ./.github/workflows/bundle-desktop-windows.yml
    with:
      ref: ${{ github.event.inputs.ref || '' }}
      signing: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.signing == 'true' }}
      windows_variant: cuda
      update_channel: stable
    secrets: inherit

  publish:
    name: Publish Windows release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [standard, cuda]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: 'Goose-*'
          merge-multiple: true
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            *.zip
            *.msix
            *.appinstaller
      - name: Publish versioned release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            *.zip
            *.msix
            *.appinstaller
          allowUpdates: true
          omitBody: true
          omitPrereleaseDuringUpdate: true
      - name: Publish stable packages
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: stable
          name: Windows Stable
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            *.zip
            *.msix
          allowUpdates: true
          removeArtifacts: true
          omitBody: true
          omitPrereleaseDuringUpdate: true
      - name: Publish stable App Installer feeds
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: stable
          name: Windows Stable
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: '*.appinstaller'
          allowUpdates: true
          omitBody: true
          omitPrereleaseDuringUpdate: true
