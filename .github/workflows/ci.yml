name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      windows-package: ${{ steps.filter.outputs.windows-package }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!documentation/**'
            windows-package:
              - 'integrations/windows-launcher/**'
              - 'ui/desktop/forge.config.ts'
              - 'ui/desktop/package.json'
              - 'ui/desktop/scripts/prepare-platform-binaries.js'
              - 'ui/desktop/src/platform/windows/**'
              - 'ui/pnpm-lock.yaml'
              - '.github/workflows/bundle-desktop-windows.yml'

  rust-core:
    name: Rust core
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    env:
      CARGO_INCREMENTAL: '0'
      RUST_MIN_STACK: '8388608'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: windows-fork-rust-core
      - name: Install Linux test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev gnome-keyring libxcb1-dev
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --exclude v8 -- -D warnings
      - name: Test core and CLI
        working-directory: crates
        run: |
          gnome-keyring-daemon --components=secrets --daemonize --unlock <<< 'goose-windows'
          cargo test -- --skip scenario_tests::scenarios::tests
          cargo test --jobs 1 scenario_tests::scenarios::tests

  desktop:
    name: Desktop
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.10.0
      - name: Install pnpm
        run: npm install --global pnpm@10.30.3
      - name: Install dependencies
        working-directory: ui/desktop
        run: pnpm install --frozen-lockfile
      - name: Lint and typecheck
        working-directory: ui/desktop
        run: pnpm run lint:check
      - name: Test Desktop
        working-directory: ui/desktop
        run: pnpm run test:run

  windows-product:
    name: Windows product
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    env:
      CARGO_INCREMENTAL: '0'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 8.0.x
      - uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          target: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: windows-fork-msvc-check
      - name: Check Windows CLI
        run: cargo check --locked --target x86_64-pc-windows-msvc -p goose-cli --bin goose
      - name: Test Launcher core
        run: dotnet test .\integrations\windows-launcher\tests\GooseLauncher.Core.Tests\GooseLauncher.Core.Tests.csproj --configuration Release
      - name: Publish WinUI Launcher
        run: >-
          dotnet publish .\integrations\windows-launcher\src\GooseLauncher.App\GooseLauncher.App.csproj
          --configuration Release --runtime win-x64 --self-contained true
          -p:WindowsAppSDKSelfContained=true -p:GooseLauncherPackaged=true
      - name: Build Explorer Shell Extension
        run: >-
          msbuild .\integrations\windows-launcher\src\GooseLauncher.ShellExtension\GooseLauncher.ShellExtension.vcxproj
          /p:Configuration=Release /p:Platform=x64 /verbosity:minimal

  schemas-sdk:
    name: Schemas and SDK
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.10.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: windows-fork-schema
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libxcb1-dev
      - name: Install UI dependencies
        run: |
          source ./bin/activate-hermit
          cd ui
          pnpm install --frozen-lockfile
      - name: Check generated ACP schema
        run: |
          source ./bin/activate-hermit
          just check-acp-schema
      - name: Test ACP SDK
        working-directory: ui/sdk
        run: |
          source ../../bin/activate-hermit
          pnpm test
          pnpm run typecheck:test

  windows-package-smoke:
    name: Windows package smoke
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.windows-package == 'true'
    permissions:
      contents: read
      actions: read
      id-token: write
    uses: ./.github/workflows/bundle-desktop-windows.yml
    with:
      signing: false
      update_channel: canary
